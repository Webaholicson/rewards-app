spring.application.name=SuperStarRewardsApplication

spring.datasource.url=jdbc:postgresql://localhost:5432/rewards_db?sslmode=disable
spring.datasource.username=rewards_user
spring.datasource.password=rewards_pass
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration