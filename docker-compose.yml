services:
  mysql:
    image: mysql:8.0
    container_name: rewards-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: rewards_db
      MYSQL_USER: rewards_user
      MYSQL_PASSWORD: rewards_pass
    ports:
      - "3306:3306"
    command: ["--default-authentication-plugin=mysql_native_password"]
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-prootpassword"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    container_name: rewards-app
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/rewards_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: rewards_user
      SPRING_DATASOURCE_PASSWORD: rewards_pass
    ports:
      - "8080:8080"

volumes:
  mysql_data:

