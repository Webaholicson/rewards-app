services:
  postgres:
    image: postgres:17
    container_name: rewards-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: rewards_db
      POSTGRES_USER: rewards_user
      POSTGRES_PASSWORD: rewards_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rewards_user -d rewards_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    container_name: rewards-app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/rewards_db
      SPRING_DATASOURCE_USERNAME: rewards_user
      SPRING_DATASOURCE_PASSWORD: rewards_pass
    ports:
      - "8080:8080"

volumes:
  postgres_data:

